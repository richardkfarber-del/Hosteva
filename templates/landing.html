<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosteva - Hosting Compliance, Simplified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #1B3A5F; }
        .bg-primary-dark { background-color: #1B3A5F; }
        .bg-primary-teal { background-color: #2B8FAD; }
        .text-primary-dark { color: #1B3A5F; }
        .text-primary-teal { color: #2B8FAD; }
        .shield-cut { clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 17px, 100% 100%, 0 100%); border-top-right-radius: 0; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="p-6 flex justify-between items-center bg-white shadow-sm">
        <div class="text-2xl font-bold tracking-tight text-primary-dark flex items-center gap-2">
            🛡️ Hosteva
        </div>
        <a href="/wizard" class="bg-primary-teal text-white px-6 py-2 rounded-md font-bold shadow hover:opacity-90 transition">Login / Start</a>
    </nav>
    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-bold mb-6">Hosting Compliance, Simplified.</h1>
        <p class="text-lg max-w-2xl mb-10 text-gray-600">Automate your short-term rental compliance, verify zoning, and manage all your properties in one place.</p>
        <div class="bg-white p-8 rounded-lg shadow-lg shield-cut w-full max-w-md border border-gray-200 text-left">
            <h2 class="text-xl font-bold mb-4">Revenue Estimator & Zoning Check</h2>
            <input type="text" placeholder="Enter Property Address (e.g., Miami, FL)" class="w-full p-3 border border-gray-300 rounded mb-4">
            <a href="/wizard" class="block text-center bg-primary-dark text-white px-6 py-3 rounded-md font-bold shadow hover:bg-opacity-90 transition w-full">Check My Property</a>
        </div>
    </main>
</body>
</html>
