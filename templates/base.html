<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Hosteva{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'surface': '#f8f9ff',
        'surface-container-low': '#eff4ff',
        'surface-container-lowest': '#ffffff',
        'surface-container-high': '#dce9ff',
        'primary': '#006576',
        'primary-container': '#1c7f92',
        'on-surface': '#001c37',
        'outline-variant': '#bec8cc',
        'tertiary-fixed': '#75fbbf'
      },
      fontFamily: {
        'display': ['Manrope', 'sans-serif'],
        'headline': ['Manrope', 'sans-serif'],
        'body': ['Inter', 'sans-serif']
      },
      boxShadow: {
        'ambient': '0 20px 40px rgba(0, 28, 55, 0.08)',
        'ambient-light': '0 20px 40px rgba(0, 28, 55, 0.04)'
      }
    }
  }
}
</script>


    <style>
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            .glass-sidebar {
                background: linear-gradient(180deg, rgba(0, 101, 118, 0.95) 0%, rgba(0, 48, 56, 0.98) 100%);
                backdrop-filter: blur(12px);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
            }
            .primary-gradient {
                background: linear-gradient(135deg, #006576 0%, #1c7f92 100%);
            }
            @media (max-width: 768px) {
                .mobile-hidden {
                    display: none !important;
                }
            }
        </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 font-body antialiased min-h-screen">
    
    <!-- Global Dashboard Shell -->
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="hidden md:flex w-[260px] h-screen fixed left-0 top-0 bg-white/80 backdrop-blur-xl border-r border-slate-200/60 shadow-2xl flex-col py-8 px-4 gap-2 z-50 mobile-hidden">
            <div class="flex flex-col justify-center items-center mb-8 px-2">
                <img src="/static/img/hosteva_logo.png" alt="Hosteva Logo" class="h-20 w-20 object-contain">
                <p class="text-[#52aecd] text-xs font-medium uppercase tracking-widest opacity-80 mt-1 font-body">Hosteva Intelligence</p>
            </div>
            <nav class="flex flex-col gap-1">
                <a class="flex items-center gap-3 py-3 px-4 text-slate-600 opacity-90 hover:bg-[#52aecd]/20 hover:opacity-100 transition-all font-medium rounded-lg {% if active_page == 'home' %}bg-[#52aecd] text-white{% endif %}" href="/">
                    <span class="material-symbols-outlined">home</span>
                    <span>Home</span>
                </a>
                <a class="flex items-center gap-3 py-3 px-4 text-slate-600 opacity-90 hover:bg-[#52aecd]/20 hover:opacity-100 transition-all font-medium rounded-lg {% if active_page == 'compliance' %}bg-[#52aecd] text-white{% endif %}" href="/wizard">
                    <span class="material-symbols-outlined">rule</span>
                    <span>Compliance Wizard</span>
                </a>
                <a class="flex items-center gap-3 py-3 px-4 text-slate-600 opacity-90 hover:bg-[#52aecd]/20 hover:opacity-100 transition-all font-medium rounded-lg {% if active_page == 'dashboard' %}bg-[#52aecd] text-white{% endif %}" href="/dashboard">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Host Dashboard</span>
                </a>
                
                <div class="mt-8 mb-2 px-4 text-xs font-bold uppercase tracking-widest text-[#52aecd]/50">Insights</div>
                <a class="flex items-center gap-3 py-3 px-4 text-slate-600 font-medium rounded-lg opacity-50 cursor-not-allowed" href="javascript:void(0)">
                    <span class="material-symbols-outlined">analytics</span>
                    <span>Analytics</span>
                </a>
            </nav>
            
            <div class="mt-auto px-4">
                <div class="bg-black/20 rounded-xl p-4 border border-white/5">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-[#75fbbf] to-[#52aecd] flex items-center justify-center font-bold text-on-surface text-sm">JS</div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">John Smith</p>
                            <p class="text-xs text-[#52aecd]">Pro Host</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 w-full ml-0 md:w-auto md:ml-[260px] relative overflow-x-hidden overflow-y-auto">
            <!-- Global Top Bar -->
            <header class="h-[72px] bg-white/50 backdrop-blur-md border-b border-slate-200/60 flex items-center justify-between px-8 sticky top-0 z-40">
                <h2 class="font-headline font-bold text-xl text-slate-800">{% block header_title %}Overview{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <button class="relative p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
