<!DOCTYPE html>
<html>
<head>
    <title>Compliance Wizard</title>
</head>
<body>
    <h1>Compliance Wizard</h1>
    <form id="wizardForm">
        <label>Property ID:</label>
        <input type="text" id="property_id" name="property_id"><br>
        <label>Zoning District:</label>
        <select id="zoning_district_id" name="zoning_district_id"></select><br>
        <label>Land Use Type:</label>
        <select id="proposed_land_use_id" name="proposed_land_use_id"></select><br>
        <label>Values (JSON):</label>
        <textarea id="actual_values" name="actual_values">{"MAX_HEIGHT": 30.0, "MIN_LOT_SIZE": 12000.0}</textarea><br>
        <button type="submit">Check Compliance</button>
    </form>
    <div id="result"></div>
    <script>
        document.getElementById('wizardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                property_id: document.getElementById('property_id').value,
                zoning_district_id: document.getElementById('zoning_district_id').value,
                proposed_land_use_id: document.getElementById('proposed_land_use_id').value,
                actual_values: JSON.parse(document.getElementById('actual_values').value)
            };
            const response = await fetch('/api/compliance/check', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': 'stark-secret-key-2026'
                },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            document.getElementById('result').innerText = JSON.stringify(result, null, 2);
        });
        
        // Initial fetch for dropdowns
        async function fetchOptions() {
            const zdResponse = await fetch('/api/zoning/districts', {
                headers: { 'X-API-Key': 'stark-secret-key-2026' }
            });
            const zds = await zdResponse.json();
            const zdSelect = document.getElementById('zoning_district_id');
            zds.forEach(zd => {
                const opt = document.createElement('option');
                opt.value = zd.id;
                opt.text = zd.name;
                zdSelect.add(opt);
            });
            
            const lutResponse = await fetch('/api/zoning/land-use-types', {
                headers: { 'X-API-Key': 'stark-secret-key-2026' }
            });
            const luts = await lutResponse.json();
            const lutSelect = document.getElementById('proposed_land_use_id');
            luts.forEach(lut => {
                const opt = document.createElement('option');
                opt.value = lut.id;
                opt.text = lut.name;
                lutSelect.add(opt);
            });
        }
        fetchOptions();
    </script>
</body>
</html>
