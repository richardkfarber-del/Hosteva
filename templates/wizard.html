<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/static/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosteva - Add Property Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #1B3A5F; }
        .bg-primary-dark { background-color: #1B3A5F; }
        .bg-primary-teal { background-color: #2B8FAD; }
        .bg-accent { background-color: #3CB4C4; }
        .shield-cut { clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 17px, 100% 100%, 0 100%); border-top-right-radius: 0; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">Add Property</h1>
            <p class="text-gray-500">Step 1: Zoning Verification</p>
        </div>
        <div class="bg-white p-8 rounded-lg shadow-lg shield-cut border border-gray-200">
            <div class="inline-block bg-accent text-white px-3 py-1 rounded-full text-xs font-bold mb-6">🛡️ Zoning Auto-Reject Active</div>
            <label class="block font-bold mb-2">Property Address</label>
            <input type="text" value="123 Ocean Drive, Miami, FL" class="w-full p-3 border border-gray-300 rounded mb-6 bg-gray-50" readonly>
            
            <label class="block font-bold mb-2">Property Type</label>
            <select class="w-full p-3 border border-gray-300 rounded mb-6">
                <option>Single-Family Home</option>
                <option>Condo / Apartment</option>
            </select>
            
            <div class="flex items-center gap-2 mb-8">
                <input type="checkbox" id="hoa" class="w-5 h-5">
                <label for="hoa" class="font-bold">Property is in an HOA</label>
            </div>

            <a href="/dashboard" class="block text-center bg-primary-teal text-white px-6 py-3 rounded-md font-bold shadow hover:bg-opacity-90 transition w-full">Verify & Generate Checklist</a>
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("SW registered"))
            .catch(err => console.log("SW registration failed", err));
        }
    </script>
</body>
</html>
