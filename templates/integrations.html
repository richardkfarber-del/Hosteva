{% extends "base.html" %}

{% block title %}Integration Settings{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Integration Settings</h1>
    
    <div class="bg-white shadow rounded-lg p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Connect Your Accounts</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Airbnb Integration -->
            <div class="border rounded-lg p-4 flex flex-col items-center">
                <img src="/static/airbnb-logo.png" alt="Airbnb" class="h-12 mb-4">
                <h3 class="text-lg font-medium mb-2">Airbnb</h3>
                <button onclick="startAuth('airbnb')" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded w-full">
                    Connect Airbnb
                </button>
            </div>
            <!-- VRBO Integration -->
            <div class="border rounded-lg p-4 flex flex-col items-center">
                <img src="/static/vrbo-logo.png" alt="VRBO" class="h-12 mb-4">
                <h3 class="text-lg font-medium mb-2">VRBO</h3>
                <button onclick="startAuth('vrbo')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">
                    Connect VRBO
                </button>
            </div>
        </div>
    </div>

    <div id="sync-status-container" class="hidden bg-blue-50 border border-blue-200 text-blue-800 px-4 py-3 rounded relative mb-8" role="alert">
        <strong class="font-bold">Sync in Progress!</strong>
        <span class="block sm:inline" id="sync-status-text">We are fetching your listings...</span>
        <div class="mt-2 w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700">
            <div class="bg-blue-600 h-2.5 rounded-full" style="width: 45%"></div>
        </div>
    </div>

    <div id="sync-results" class="hidden bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded relative">
        <strong class="font-bold">Sync Complete!</strong>
        <span class="block sm:inline" id="sync-results-text"></span>
    </div>

</div>

<script>
async function startAuth(provider) {
    try {
        const response = await fetch(`/api/v1/integrations/ota/${provider}/auth`);
        const data = await response.json();
        // In a real app we'd redirect to data.auth_url
        // window.location.href = data.auth_url;
        
        const urlParams = new URLSearchParams(data.auth_url.split('?')[1]);
        const state = urlParams.get('state');
        
        // Mocking the redirect and callback
        simulateCallback(provider, state);
    } catch (error) {
        console.error('Error starting auth:', error);
    }
}

async function simulateCallback(provider, state) {
    try {
        // Mocking the callback hitting our backend
        const response = await fetch(`/api/v1/integrations/ota/${provider}/callback?code=mock_code_123&state=${state}`);
        const data = await response.json();
        
        if(data.status === 'success') {
            startSync(provider, data.connection_id);
        }
    } catch (error) {
        console.error('Callback error:', error);
    }
}

async function startSync(provider, connectionId) {
    try {
        const response = await fetch(`/api/v1/integrations/ota/${provider}/sync?connection_id=${connectionId}`, {
            method: 'POST'
        });
        const data = await response.json();
        
        document.getElementById('sync-status-container').classList.remove('hidden');
        document.getElementById('sync-results').classList.add('hidden');
        
        pollSyncStatus(data.sync_job_id);
    } catch (error) {
        console.error('Sync error:', error);
    }
}

async function pollSyncStatus(jobId) {
    const interval = setInterval(async () => {
        try {
            const response = await fetch(`/api/v1/integrations/ota/sync/${jobId}`);
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            const data = await response.json();
            
            if (data.status === 'completed') {
                clearInterval(interval);
                document.getElementById('sync-status-container').classList.add('hidden');
                document.getElementById('sync-results').classList.remove('hidden');
                document.getElementById('sync-results-text').innerText = `Successfully synced ${data.listings_synced} listings.`;
            } else if (data.status === 'failed') {
                clearInterval(interval);
                document.getElementById('sync-status-container').classList.add('hidden');
                alert('Sync failed!');
            }
        } catch (error) {
            console.error('Polling error:', error);
            clearInterval(interval);
        }
    }, 1000);
}
</script>
{% endblock %}
