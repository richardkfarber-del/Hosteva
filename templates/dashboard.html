<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosteva - Compliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #1B3A5F; }
        .bg-primary-dark { background-color: #1B3A5F; }
        .bg-primary-teal { background-color: #2B8FAD; }
        .shield-cut { clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 17px, 100% 100%, 0 100%); border-top-right-radius: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="bg-primary-dark text-white w-full md:w-64 p-6 flex flex-col gap-4">
        <div class="text-2xl font-bold mb-8">🛡️ Hosteva</div>
        <a href="#" class="font-bold opacity-100">📋 Compliance Hub</a>
        <a href="#" class="font-bold opacity-60 hover:opacity-100">📅 Multi-Calendar</a>
        <a href="#" class="font-bold opacity-60 hover:opacity-100">💬 Unified Inbox</a>
        <a href="#" class="font-bold opacity-60 hover:opacity-100">📈 Financials</a>
        <div class="mt-auto">
            <a href="/" class="text-sm opacity-60 hover:opacity-100">← Logout</a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-grow p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Property Compliance Hub</h1>
            <a href="/wizard" class="bg-primary-teal text-white px-4 py-2 rounded font-bold shadow">+ Add Property</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Property Card -->
            <div class="bg-white p-6 rounded-lg shadow shield-cut border border-gray-200">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl font-bold">123 Ocean Drive</h2>
                    <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded">Action Required</span>
                </div>
                <p class="text-sm text-gray-500 mb-6">Miami, FL • Single-Family</p>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center text-sm border-b pb-2">
                        <span>DBPR State License</span>
                        <span class="text-red-500 font-bold">Missing</span>
                    </div>
                    <div class="flex justify-between items-center text-sm border-b pb-2">
                        <span>Miami-Dade County Tax Reg.</span>
                        <span class="text-green-500 font-bold">Verified</span>
                    </div>
                    <div class="flex justify-between items-center text-sm border-b pb-2">
                        <span>City of Miami Certificate</span>
                        <span class="text-red-500 font-bold">Missing</span>
                    </div>
                </div>
                
                <button class="mt-6 w-full border-2 border-dashed border-primary-teal text-primary-teal font-bold py-2 rounded hover:bg-gray-50 transition">
                    Upload Documents (AI Auditor)
                </button>
            </div>
        </div>
    </main>
</body>
</html>
