services:
  - type: web
    name: hosteva-api
    env: docker
    plan: free
    dockerCommand: "gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT:-8000}"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hosteva-db
          property: connectionString

databases:
  - name: hosteva-db
    plan: free
    postgresMajorVersion: "15"